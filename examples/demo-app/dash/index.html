<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lumon — Live Dashboard</title>
<style>
  :root { --ink:#16161a; --muted:#6b6b70; --accent:#2563eb; --line:#e8e6e0; --bg:#faf9f6 }
  * { box-sizing:border-box; margin:0 }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased }
  header { display:flex; justify-content:space-between; align-items:center; padding:22px 48px;
           border-bottom:1px solid var(--line); background:#fff }
  .brand { font-weight:700 } .brand span { color:var(--accent) }
  header a { font-size:14px; color:var(--muted); text-decoration:none }
  header a:hover { color:var(--ink) }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:36px 48px }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:24px;
          box-shadow:0 1px 3px rgba(22,22,26,.04) }
  .card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px }
  .card .num { font-size:40px; font-weight:700; margin-top:10px; letter-spacing:-1px;
               font-variant-numeric:tabular-nums }
  .card .delta { font-size:13px; color:var(--accent); font-weight:600; margin-top:6px }
  h2 { font-size:15px; font-weight:600; margin:8px 48px 14px; color:var(--muted) }
  ul { list-style:none; margin:0 48px 48px; padding:0 }
  li { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px 22px;
       margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;
       transition:border-color .15s, transform .15s; cursor:pointer }
  li:hover { border-color:var(--accent); transform:translateX(4px) }
  li .tag { color:var(--accent); font-weight:600; font-size:14px }
</style>
</head>
<body>
  <header>
    <div class="brand">Lumon <span>Metrics</span> — Live Dashboard</div>
    <a href="/">&larr; Back to site</a>
  </header>
  <div class="grid">
    <div class="card"><div class="label">Active users</div><div class="num" id="n1">0</div><div class="delta">&#9650; 14% this week</div></div>
    <div class="card"><div class="label">Events / sec</div><div class="num" id="n2">0</div><div class="delta">&#9650; 6% this week</div></div>
    <div class="card"><div class="label">Ingest uptime</div><div class="num">99.99%</div><div class="delta">30-day rolling</div></div>
  </div>
  <h2>This week</h2>
  <ul id="tasks">
    <li id="task-ship"><span>Ship weekly digest emails</span><span class="tag">On track</span></li>
    <li><span>Migrate events pipeline to v2</span><span class="tag">In review</span></li>
    <li><span>Quarterly metrics deep-dive</span><span class="tag">Planned</span></li>
  </ul>
  <script>
    let a = 0, b = 0;
    setInterval(() => {
      a = Math.min(12842, a + 257); b = Math.min(431, b + 9);
      document.getElementById("n1").textContent = a.toLocaleString();
      document.getElementById("n2").textContent = String(b);
    }, 50);
  </script>
</body>
</html>
